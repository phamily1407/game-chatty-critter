<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Tail -->
  <path d="M 148 178 Q 182 158 176 128 Q 170 108 158 122"
        stroke="#F4A7B9" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="100" cy="162" rx="50" ry="42" fill="#F9D0DC"/>
  <!-- Head -->
  <circle cx="100" cy="88" r="52" fill="#F9D0DC"/>
  <!-- Left ear outer -->
  <polygon points="57,54 44,16 80,48" fill="#F9D0DC"/>
  <!-- Left ear inner -->
  <polygon points="60,49 52,24 76,46" fill="#F4A7B9"/>
  <!-- Right ear outer -->
  <polygon points="143,54 156,16 120,48" fill="#F9D0DC"/>
  <!-- Right ear inner -->
  <polygon points="140,49 148,24 124,46" fill="#F4A7B9"/>
  <!-- Eye whites -->
  <ellipse cx="80" cy="84" rx="13" ry="12" fill="white"/>
  <ellipse cx="120" cy="84" rx="13" ry="12" fill="white"/>
  <!-- Pupils (vertical slit - cat style) -->
  <ellipse cx="80" cy="84" rx="5" ry="11" fill="#2D1A2D"/>
  <ellipse cx="120" cy="84" rx="5" ry="11" fill="#2D1A2D"/>
  <!-- Eye shine -->
  <circle cx="83" cy="79" r="3" fill="white"/>
  <circle cx="123" cy="79" r="3" fill="white"/>
  <!-- Nose -->
  <polygon points="100,99 96,104 104,104" fill="#F4A7B9"/>
  <!-- Mouth -->
  <path d="M 96 104 Q 92 110 88 108" stroke="#E87E97" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 104 104 Q 108 110 112 108" stroke="#E87E97" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="46" y1="93" x2="82" y2="96" stroke="#C8A0B4" stroke-width="1.4"/>
  <line x1="46" y1="100" x2="82" y2="100" stroke="#C8A0B4" stroke-width="1.4"/>
  <!-- Whiskers right -->
  <line x1="154" y1="93" x2="118" y2="96" stroke="#C8A0B4" stroke-width="1.4"/>
  <line x1="154" y1="100" x2="118" y2="100" stroke="#C8A0B4" stroke-width="1.4"/>
  <!-- Blush -->
  <ellipse cx="67" cy="100" rx="11" ry="7" fill="#F4A7B9" opacity="0.55"/>
  <ellipse cx="133" cy="100" rx="11" ry="7" fill="#F4A7B9" opacity="0.55"/>
  <!-- Paws -->
  <ellipse cx="76" cy="196" rx="22" ry="14" fill="#F9D0DC"/>
  <ellipse cx="124" cy="196" rx="22" ry="14" fill="#F9D0DC"/>
  <!-- Paw toes -->
  <ellipse cx="66" cy="192" rx="5" ry="4" fill="#F4A7B9"/>
  <ellipse cx="76" cy="189" rx="5" ry="4" fill="#F4A7B9"/>
  <ellipse cx="86" cy="192" rx="5" ry="4" fill="#F4A7B9"/>
  <ellipse cx="114" cy="192" rx="5" ry="4" fill="#F4A7B9"/>
  <ellipse cx="124" cy="189" rx="5" ry="4" fill="#F4A7B9"/>
  <ellipse cx="134" cy="192" rx="5" ry="4" fill="#F4A7B9"/>
</svg>
