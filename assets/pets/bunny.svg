<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Left ear outer -->
  <ellipse cx="76" cy="36" rx="18" ry="44" fill="#E8D4F8" transform="rotate(-8 76 36)"/>
  <!-- Right ear outer -->
  <ellipse cx="124" cy="36" rx="18" ry="44" fill="#E8D4F8" transform="rotate(8 124 36)"/>
  <!-- Left ear inner -->
  <ellipse cx="76" cy="36" rx="10" ry="34" fill="#C8A8E8" transform="rotate(-8 76 36)" opacity="0.7"/>
  <!-- Right ear inner -->
  <ellipse cx="124" cy="36" rx="10" ry="34" fill="#C8A8E8" transform="rotate(8 124 36)" opacity="0.7"/>
  <!-- Body -->
  <ellipse cx="100" cy="164" rx="50" ry="42" fill="#EEE0F8"/>
  <!-- Tummy patch -->
  <ellipse cx="100" cy="168" rx="30" ry="26" fill="#F8F0FF"/>
  <!-- Head -->
  <circle cx="100" cy="94" r="52" fill="#EEE0F8"/>
  <!-- Eye whites -->
  <circle cx="80" cy="88" r="14" fill="white"/>
  <circle cx="120" cy="88" r="14" fill="white"/>
  <!-- Iris - soft pink/violet -->
  <circle cx="80" cy="88" r="9" fill="#9B6EC8"/>
  <circle cx="120" cy="88" r="9" fill="#9B6EC8"/>
  <!-- Pupils -->
  <circle cx="80" cy="88" r="5.5" fill="#1A0E2D"/>
  <circle cx="120" cy="88" r="5.5" fill="#1A0E2D"/>
  <!-- Eye shine -->
  <circle cx="83" cy="83" r="3" fill="white"/>
  <circle cx="123" cy="83" r="3" fill="white"/>
  <!-- Small gentle eyelashes -->
  <path d="M 68 80 Q 72 76 76 80" stroke="#C8A8E8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 124 80 Q 128 76 132 80" stroke="#C8A8E8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nose - tiny pink -->
  <ellipse cx="100" cy="106" rx="5" ry="4" fill="#D4A0C0"/>
  <!-- Shy little smile -->
  <path d="M 94 113 Q 100 118 106 113" stroke="#D4A0C0" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Blush - very soft -->
  <ellipse cx="67" cy="104" rx="12" ry="8" fill="#C8A8E8" opacity="0.4"/>
  <ellipse cx="133" cy="104" rx="12" ry="8" fill="#C8A8E8" opacity="0.4"/>
  <!-- Little hands held together -->
  <ellipse cx="86" cy="186" rx="16" ry="12" fill="#EEE0F8"/>
  <ellipse cx="114" cy="186" rx="16" ry="12" fill="#EEE0F8"/>
  <!-- Fluffy tail -->
  <circle cx="148" cy="172" r="12" fill="#F8F0FF"/>
  <!-- Feet -->
  <ellipse cx="78" cy="204" rx="22" ry="12" fill="#EEE0F8"/>
  <ellipse cx="122" cy="204" rx="22" ry="12" fill="#EEE0F8"/>
</svg>
