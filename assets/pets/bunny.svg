<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- All Y coordinates shifted -6 from original so head center = cy=88 (design standard) -->
  <!-- Left ear outer (cy 36→30) -->
  <ellipse cx="76" cy="30" rx="18" ry="44" fill="#E8D4F8" transform="rotate(-8 76 30)"/>
  <!-- Right ear outer -->
  <ellipse cx="124" cy="30" rx="18" ry="44" fill="#E8D4F8" transform="rotate(8 124 30)"/>
  <!-- Left ear inner -->
  <ellipse cx="76" cy="30" rx="10" ry="34" fill="#C8A8E8" transform="rotate(-8 76 30)" opacity="0.7"/>
  <!-- Right ear inner -->
  <ellipse cx="124" cy="30" rx="10" ry="34" fill="#C8A8E8" transform="rotate(8 124 30)" opacity="0.7"/>
  <!-- Body (cy 164→158) -->
  <ellipse cx="100" cy="158" rx="50" ry="42" fill="#EEE0F8"/>
  <!-- Tummy patch (cy 168→162) -->
  <ellipse cx="100" cy="162" rx="30" ry="26" fill="#F8F0FF"/>
  <!-- Head (cy 94→88 = STANDARD) -->
  <circle cx="100" cy="88" r="52" fill="#EEE0F8"/>
  <!-- Eye whites (cy 88→82) -->
  <circle cx="80" cy="82" r="14" fill="white"/>
  <circle cx="120" cy="82" r="14" fill="white"/>
  <!-- Iris -->
  <circle cx="80" cy="82" r="9" fill="#9B6EC8"/>
  <circle cx="120" cy="82" r="9" fill="#9B6EC8"/>
  <!-- Pupils -->
  <circle cx="80" cy="82" r="5.5" fill="#1A0E2D"/>
  <circle cx="120" cy="82" r="5.5" fill="#1A0E2D"/>
  <!-- Eye shine (cy 83→77) -->
  <circle cx="83" cy="77" r="3" fill="white"/>
  <circle cx="123" cy="77" r="3" fill="white"/>
  <!-- Eyelashes (y 80→74, 76→70) -->
  <path d="M 68 74 Q 72 70 76 74" stroke="#C8A8E8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 124 74 Q 128 70 132 74" stroke="#C8A8E8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nose (cy 106→100) -->
  <ellipse cx="100" cy="100" rx="5" ry="4" fill="#D4A0C0"/>
  <!-- Shy smile (y 113→107, 118→112) -->
  <path d="M 94 107 Q 100 112 106 107" stroke="#D4A0C0" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Blush (cy 104→98) -->
  <ellipse cx="67" cy="98" rx="12" ry="8" fill="#C8A8E8" opacity="0.4"/>
  <ellipse cx="133" cy="98" rx="12" ry="8" fill="#C8A8E8" opacity="0.4"/>
  <!-- Little hands (cy 186→180) -->
  <ellipse cx="86" cy="180" rx="16" ry="12" fill="#EEE0F8"/>
  <ellipse cx="114" cy="180" rx="16" ry="12" fill="#EEE0F8"/>
  <!-- Fluffy tail (cy 172→166) -->
  <circle cx="148" cy="166" r="12" fill="#F8F0FF"/>
  <!-- Feet (cy 204→198) -->
  <ellipse cx="78" cy="198" rx="22" ry="12" fill="#EEE0F8"/>
  <ellipse cx="122" cy="198" rx="22" ry="12" fill="#EEE0F8"/>
</svg>
