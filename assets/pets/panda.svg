<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Body (white) -->
  <ellipse cx="100" cy="162" rx="52" ry="44" fill="#F0EEE8"/>
  <!-- Black shoulder patches -->
  <ellipse cx="58" cy="146" rx="30" ry="36" fill="#1C1830"/>
  <ellipse cx="142" cy="146" rx="30" ry="36" fill="#1C1830"/>
  <!-- White belly -->
  <ellipse cx="100" cy="168" rx="36" ry="32" fill="#F0EEE8"/>
  <!-- Head (white) -->
  <circle cx="100" cy="88" r="54" fill="#F0EEE8"/>
  <!-- Black ears -->
  <circle cx="62" cy="45" r="24" fill="#1C1830"/>
  <circle cx="138" cy="45" r="24" fill="#1C1830"/>
  <!-- Black eye patches (iconic) -->
  <ellipse cx="79" cy="86" rx="20" ry="18" fill="#1C1830"/>
  <ellipse cx="121" cy="86" rx="20" ry="18" fill="#1C1830"/>
  <!-- Eyes (white inside patches) -->
  <circle cx="79" cy="84" r="11" fill="white"/>
  <circle cx="121" cy="84" r="11" fill="white"/>
  <!-- Iris (blue-grey) -->
  <circle cx="79" cy="84" r="7" fill="#3C4080"/>
  <circle cx="121" cy="84" r="7" fill="#3C4080"/>
  <!-- Pupils -->
  <circle cx="79" cy="84" r="4" fill="#080818"/>
  <circle cx="121" cy="84" r="4" fill="#080818"/>
  <!-- Eye shine -->
  <circle cx="82" cy="80" r="2.5" fill="white"/>
  <circle cx="124" cy="80" r="2.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="100" cy="107" rx="10" ry="8" fill="#1C1830"/>
  <!-- Mouth -->
  <path d="M 93 115 Q 100 122 107 115" stroke="#404040" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Blush (on white cheeks between patches) -->
  <ellipse cx="65" cy="104" rx="9" ry="6" fill="#F4A0C0" opacity="0.5"/>
  <ellipse cx="135" cy="104" rx="9" ry="6" fill="#F4A0C0" opacity="0.5"/>
  <!-- Paws (black) -->
  <ellipse cx="76" cy="198" rx="22" ry="13" fill="#1C1830"/>
  <ellipse cx="124" cy="198" rx="22" ry="13" fill="#1C1830"/>
</svg>
