<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Tail feathers -->
  <path d="M 84 188 Q 76 210 70 220"  stroke="#18A028" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path d="M 100 192 Q 100 215 100 220" stroke="#38B840" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path d="M 116 188 Q 124 210 130 220" stroke="#18A028" stroke-width="11" fill="none" stroke-linecap="round"/>
  <!-- Body (green) -->
  <ellipse cx="100" cy="158" rx="50" ry="44" fill="#28B038"/>
  <!-- Wing shading -->
  <ellipse cx="58" cy="154" rx="22" ry="38" fill="#1C9028" transform="rotate(-5 58 154)"/>
  <ellipse cx="142" cy="154" rx="22" ry="38" fill="#1C9028" transform="rotate(5 142 154)"/>
  <!-- Chest splash (orange) -->
  <ellipse cx="100" cy="162" rx="28" ry="24" fill="#F08020" opacity="0.7"/>
  <!-- Head (green) -->
  <circle cx="100" cy="86" r="52" fill="#28B038"/>
  <!-- Blue forehead patch -->
  <ellipse cx="100" cy="56" rx="26" ry="18" fill="#3878E0" opacity="0.65"/>
  <!-- Eye whites (large, expressive) -->
  <circle cx="80" cy="84" r="15" fill="#F8F0D0"/>
  <circle cx="120" cy="84" r="15" fill="#F8F0D0"/>
  <!-- Iris (bright red) -->
  <circle cx="80" cy="84" r="10" fill="#E03818"/>
  <circle cx="120" cy="84" r="10" fill="#E03818"/>
  <!-- Pupils -->
  <circle cx="80" cy="84" r="5.5" fill="#100808"/>
  <circle cx="120" cy="84" r="5.5" fill="#100808"/>
  <!-- Eye shine -->
  <circle cx="83" cy="79" r="3" fill="white"/>
  <circle cx="123" cy="79" r="3" fill="white"/>
  <!-- Curved beak (upper) -->
  <path d="M 91 101 Q 100 93 109 101 Q 109 113 100 118 Q 91 113 91 101 Z" fill="#F0A020"/>
  <!-- Beak lower line -->
  <path d="M 93 109 Q 100 115 107 109" fill="#C88010"/>
  <!-- Yellow cheek rings -->
  <ellipse cx="67" cy="98" rx="13" ry="9" fill="#F0D020" opacity="0.6"/>
  <ellipse cx="133" cy="98" rx="13" ry="9" fill="#F0D020" opacity="0.6"/>
  <!-- Feet (perch grips, brown) -->
  <ellipse cx="84" cy="198" rx="18" ry="10" fill="#A06010"/>
  <ellipse cx="116" cy="198" rx="18" ry="10" fill="#A06010"/>
  <!-- Claw lines -->
  <path d="M 76 200 Q 74 210 76 208" stroke="#806010" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 84 202 Q 82 213 84 211" stroke="#806010" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 92 200 Q 94 210 92 208" stroke="#806010" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
