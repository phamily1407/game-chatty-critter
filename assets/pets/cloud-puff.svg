  <line x1="30" y1="80" x2="38" y2="72" stroke="#A8D4EC" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="30" y1="72" x2="38" y2="80" stroke="#A8D4EC" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="164" y1="92" x2="172" y2="84" stroke="#A8D4EC" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="164" y1="84" x2="172" y2="92" stroke="#A8D4EC" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Rainbow arc at bottom -->
  <path d="M 55 190 Q 100 170 145 190" stroke="#FFB3C6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
