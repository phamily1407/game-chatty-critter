  <circle cx="56" cy="128" r="22" fill="#D4EEF8"/>
  <circle cx="144" cy="128" r="22" fill="#D4EEF8"/>
  <!-- Inner glow / lighter center -->
  <circle cx="100" cy="130" r="44" fill="#EAF6FC" opacity="0.6"/>
  <!-- Dreamy half-closed eyes -->
  <!-- Left eye -->
