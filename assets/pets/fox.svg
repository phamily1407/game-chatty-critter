<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Tail -->
  <path d="M 152 182 Q 188 158 182 126 Q 176 106 160 118"
        stroke="#E08818" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Tail tip (white) -->
  <circle cx="160" cy="118" r="11" fill="#FFF0D8"/>
  <!-- Body -->
  <ellipse cx="100" cy="162" rx="50" ry="42" fill="#F09020"/>
  <!-- White belly -->
  <ellipse cx="100" cy="170" rx="32" ry="28" fill="#FFF0D8"/>
  <!-- Head -->
  <circle cx="100" cy="88" r="52" fill="#F09020"/>
  <!-- White face mask -->
  <ellipse cx="100" cy="96" rx="30" ry="26" fill="#FFF0D8"/>
  <!-- Left ear -->
  <polygon points="57,52 42,14 82,46" fill="#F09020"/>
  <!-- Left ear inner -->
  <polygon points="62,47 52,22 78,44" fill="#F0A0A0"/>
  <!-- Right ear -->
  <polygon points="143,52 158,14 118,46" fill="#F09020"/>
  <!-- Right ear inner -->
  <polygon points="138,47 148,22 122,44" fill="#F0A0A0"/>
  <!-- Eye whites -->
  <circle cx="80" cy="84" r="13" fill="white"/>
  <circle cx="120" cy="84" r="13" fill="white"/>
  <!-- Iris (amber) -->
  <circle cx="80" cy="84" r="9" fill="#7A4018"/>
  <circle cx="120" cy="84" r="9" fill="#7A4018"/>
  <!-- Pupils -->
  <circle cx="80" cy="84" r="5" fill="#1A0808"/>
  <circle cx="120" cy="84" r="5" fill="#1A0808"/>
  <!-- Eye shine -->
  <circle cx="83" cy="80" r="3" fill="white"/>
  <circle cx="123" cy="80" r="3" fill="white"/>
  <!-- Clever arched brows -->
  <path d="M 68 71 Q 76 66 86 71" stroke="#C87010" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 114 71 Q 124 66 132 71" stroke="#C87010" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="100" cy="104" rx="7" ry="5" fill="#1A0808"/>
  <!-- Sly smile -->
  <path d="M 93 109 Q 100 115 107 109" stroke="#C87010" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="67" cy="100" rx="11" ry="7" fill="#F09090" opacity="0.4"/>
  <ellipse cx="133" cy="100" rx="11" ry="7" fill="#F09090" opacity="0.4"/>
  <!-- Paws -->
  <ellipse cx="76" cy="196" rx="22" ry="13" fill="#F09020"/>
  <ellipse cx="124" cy="196" rx="22" ry="13" fill="#F09020"/>
</svg>
